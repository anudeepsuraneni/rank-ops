name: CI  # workflow name

on: [push, pull_request]  # run on push and PRs

jobs:
  build-and-test:
    runs-on: ubuntu-latest  # GitHub-hosted Linux runner
    steps:
      # checkout code with Git LFS (needed if repo has large files like datasets or models)
      - uses: actions/checkout@v3
        with:
          lfs: true

      # setup Python 3.13
      - uses: actions/setup-python@v4
        with:
          python-version: '3.13'

      # install dependencies via poetry
      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install poetry
          poetry install --no-root

      # run tests with pytest
      - name: Run tests
        run: |
          poetry run pytest -q
